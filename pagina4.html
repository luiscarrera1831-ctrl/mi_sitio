<!DOCTYPE html>
<html>
<head>
    <title>pagina4</title>
<style> 
.boton{
    background-color: #f3f8f3;
    border: none;
    color: rgb(128, 0, 128);
    padding: 15px 32px;
    text-align: center;
    text-decoration: none;
    display: inline-block;
    font-size: 16px;
    margin: 4px 2px;
    cursor: pointer;
}
    h1{
text-align: center;
}
 p{
text-align: center;
}
img{
display: block;
margin: auto;
}
 h2{
text-align: center;
}
 h1{color:black;}
 p{color:white;}
 body{
    background: linear-gradient(
135deg,
#2d1b4e);
height: 100vh

}
.contenedor{
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
    background-color: rgb(75, 0, 130);
    border-radius: 10px;
    margin-top: 20px;
}
select{
    padding: 10px;
    font-size: 16px;
    border-radius: 5px;
    border: none;
    margin: 10px auto;
    display: block;
    width: 100%;
    max-width: 400px;
}
#info-container{
    background-color: rgba(255, 255, 255, 0.1);
    padding: 20px;
    border-radius: 10px;
    margin-top: 20px;
    display: none;
}
</style>
</head>
<body>

    <div class="contenedor">
    <h1>Información sobre drogas</h1> 

    <p>Selecciona una opción para ver información detallada:</p>
    
    <select id="selector" onchange="mostrarInfo()">
        <option value="">-- Selecciona una opción --</option>
        <option value="marihuana">Marihuana</option>
        <option value="cocaina">Cocaína</option>
        <option value="alcohol">Alcohol</option>
        <option value="tabaco">Tabaco</option>
        <option value="prevencion">Prevención</option>
    </select>

    <div id="info-container">
        <h2 id="info-titulo"></h2>
        <p id="info-texto"></p>
    </div>
    </div>

 <div class="contenedor">
    <a href="pagina.html" class="boton">Volver al Inicio</a>     
    <br>
     <a href="pagina2.html" class="boton">Ir a pagina2</a>
    <br><br>
     <a href="pagina3.html" class="boton">Ir a pagina3</a>
 </div>

<script>
const informacion = {
    marihuana: {
        titulo: "Marihuana",
        texto: "La marihuana es una droga derivada de la planta Cannabis sativa. Sus efectos incluyen alteración de la percepción, euforia, relajación y deterioro de la memoria a corto plazo. El consumo prolongado puede afectar el aprendizaje, la memoria y la salud mental."
    },
    cocaina: {
        titulo: "Cocaína",
        texto: "La cocaína es un estimulante potente del sistema nervioso central. Produce euforia intensa, aumento de energía y alerta. Sus riesgos incluyen adicción rápida, problemas cardíacos, derrames cerebrales y daño psicológico severo."
    },
    alcohol: {
        titulo: "Alcohol",
        texto: "El alcohol es una sustancia depresora del sistema nervioso central. Su consumo excesivo puede causar daño hepático, problemas cardiovasculares, deterioro cognitivo y dependencia. Es una de las drogas más consumidas y con mayores consecuencias sociales."
    },
    tabaco: {
        titulo: "Tabaco",
        texto: "El tabaco contiene nicotina, una sustancia altamente adictiva. El consumo de tabaco es la principal causa prevenible de enfermedades como cáncer de pulmón, enfermedades cardíacas y respiratorias. La nicotina crea dependencia física y psicológica."
    },
    prevencion: {
        titulo: "Prevención",
        texto: "La prevención efectiva incluye: educación temprana sobre los riesgos, comunicación abierta en familia, desarrollo de habilidades sociales, fomento de actividades saludables, y acceso a programas de apoyo. La detección temprana y la intervención son clave."
    }
};

function mostrarInfo() {
    const selector = document.getElementById('selector');
    const infoContainer = document.getElementById('info-container');
    const infoTitulo = document.getElementById('info-titulo');
    const infoTexto = document.getElementById('info-texto');
    
    const seleccion = selector.value;
    
    if (seleccion && informacion[seleccion]) {
        infoContainer.style.display = 'block';
        infoTitulo.textContent = informacion[seleccion].titulo;
        infoTexto.textContent = informacion[seleccion].texto;
    } else {
        infoContainer.style.display = 'none';
    }
}
</script>

</body>
</html>
